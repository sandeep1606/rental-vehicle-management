spring:
  datasource:
    url: jdbc:h2:mem:rvms_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6399

app:
  cache:
    lru:
      use-redis: false
      max-size: 5

langchain4j:
  ai:
    mock-mode: true
