spring:
  application:
    name: rental-vehicle-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rvms}
    username: ${DB_USERNAME:rvms_user}
    password: ${DB_PASSWORD:rvms_password}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 2000ms
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-256-bits-long-please}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  issuer: rental-vehicle-management

app:
  cache:
    lru:
      enabled: true
      max-size: ${LRU_CACHE_SIZE:50}
      ttl-seconds: ${LRU_CACHE_TTL_SECONDS:600}
      use-redis: ${LRU_USE_REDIS:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  rental:
    late-fee-multiplier: 1.5
    grace-period-hours: 2

langchain4j:
  ai:
    provider: ${AI_PROVIDER:openai}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model-name: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      temperature: 0.2
    mock-mode: ${AI_MOCK_MODE:true}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.rvms: INFO
    org.hibernate.SQL: WARN
