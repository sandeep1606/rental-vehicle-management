services:
  postgres:
    image: postgres:16-alpine
    container_name: rvms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rvms}
      POSTGRES_USER: ${DB_USERNAME:-rvms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rvms_password}
    ports:
      - "5432:5432"
    volumes:
      - rvms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rvms_user} -d ${DB_NAME:-rvms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rvms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: rvms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-rvms}
      DB_USERNAME: ${DB_USERNAME:-rvms_user}
      DB_PASSWORD: ${DB_PASSWORD:-rvms_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-256-bits-long-please}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      LRU_CACHE_SIZE: ${LRU_CACHE_SIZE:-50}
      LRU_USE_REDIS: ${LRU_USE_REDIS:-true}
      AI_MOCK_MODE: ${AI_MOCK_MODE:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: rvms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  rvms_postgres_data:
